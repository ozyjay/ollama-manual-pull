# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "ollama-manual-pull"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"

python3 -m venv .venv
./.venv/bin/python -m pip install --upgrade pip
./.venv/bin/python -m pip install -e .
'''

[cleanup]
script = '''
cd "$CODEX_WORKTREE_PATH"

find . -type d -name __pycache__ -prune -exec rm -rf {} +
find . -name "*.pyc" -delete
'''

[[actions]]
name = "Run Tests"
icon = "test"
command = '''
cd "$CODEX_WORKTREE_PATH"
./.venv/bin/python -m unittest discover -s tests -v
'''

[[actions]]
name = "Check Syntax"
icon = "tool"
command = '''
cd "$CODEX_WORKTREE_PATH"
./.venv/bin/python -m py_compile src/ollama_manual_pull/*.py tests/*.py
node --check src/ollama_manual_pull/web/app.js
'''

[[actions]]
name = "Run Web UI"
icon = "run"
command = '''
cd "$CODEX_WORKTREE_PATH"
./.venv/bin/ollama-manual-pull-web
'''

[[actions]]
name = "Verify & Build App"
icon = "debug"
command = '''
cd "$CODEX_WORKTREE_PATH"

PYENV_PYTHON="$(python3 -c 'import sys; print(sys.executable)')"

PYTHONPATH=src:. ./.venv/bin/python -m unittest discover -s tests -v
./.venv/bin/python -m py_compile src/ollama_manual_pull/*.py tests/*.py scripts/*.py
node --check src/ollama_manual_pull/web/app.js
./.venv/bin/python scripts/build_macos_app.py --python "$PYENV_PYTHON"
'''
